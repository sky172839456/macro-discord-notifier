name: Exchange Listing Monitor
on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Notification target
        required: true
        default: test
        type: choice
        options:
          - test
          - production-connectivity
permissions:
  contents: read
concurrency:
  group: exchange-listing-monitor
  cancel-in-progress: false
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache/restore@v4
        with:
          path: .state/exchange-listings.json
          key: exchange-listing-state-${{ github.run_id }}
          restore-keys: exchange-listing-state-
      - name: Monitor production channel or send a labelled test
        env:
          DISCORD_EXCHANGE_LISTING_WEBHOOK_URL: ${{ secrets.DISCORD_EXCHANGE_LISTING_WEBHOOK_URL }}
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python bybit_notifier.py --source-check
            if [ "${{ inputs.target }}" = "production-connectivity" ]; then
              python bybit_notifier.py --production-test
            else
              python bybit_notifier.py --test
            fi
          elif [ -z "$DISCORD_EXCHANGE_LISTING_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_EXCHANGE_LISTING_WEBHOOK_URL is not configured; production notification skipped."
          else
            python bybit_notifier.py
          fi
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/exchange-listings.json
          key: exchange-listing-state-${{ github.run_id }}
