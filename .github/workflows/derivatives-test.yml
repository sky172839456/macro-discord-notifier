name: Derivatives Monitor Test

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore derivatives state
        uses: actions/cache/restore@v4
        with:
          path: .state/derivatives.json
          key: derivatives-state-${{ github.run_id }}
          restore-keys: derivatives-state-

      - name: Monitor derivatives or show test templates
        env:
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python derivatives_notifier.py --test-templates
          else
            python derivatives_notifier.py
          fi

      - name: Save derivatives state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state/derivatives.json
          key: derivatives-state-${{ github.run_id }}
