name: Discord Macro Alerts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macro-discord-alerts
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore notification state
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: macro-state-${{ github.run_id }}
          restore-keys: macro-state-

      - name: Send due notifications
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_TEST_WEBHOOK_URL: ${{ secrets.DISCORD_TEST_WEBHOOK_URL }}
          DISCORD_LOG_WEBHOOK_URL: ${{ secrets.DISCORD_LOG_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python notifier.py --source-check
            python notifier.py --test-notification
          else
            python notifier.py
          fi

      - name: Save notification state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: macro-state-${{ github.run_id }}

      - name: Report workflow failure
        if: failure()
        env:
          DISCORD_LOG_WEBHOOK_URL: ${{ secrets.DISCORD_LOG_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.request import Request, urlopen

          webhook = os.environ.get("DISCORD_LOG_WEBHOOK_URL")
          if webhook:
              payload = {
                  "username": "美國總經雷達｜系統監控",
                  "embeds": [{
                      "title": "🔴 GitHub Actions 執行失敗",
                      "description": f"請查看執行紀錄：\n{os.environ['RUN_URL']}",
                      "color": 0xE74C3C,
                  }],
              }
              request = Request(webhook, data=json.dumps(payload).encode("utf-8"),
                                headers={"Content-Type": "application/json"}, method="POST")
              with urlopen(request, timeout=20):
                  pass
          PY
